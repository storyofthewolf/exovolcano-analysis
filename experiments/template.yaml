# template.yaml — complete reference for a BATCH configuration.
#
# A batch describes one planet and the eruption cases run on it. Copy this
# file, rename it for your batch, and fill in your values.
#
# The split is deliberate:
#   * Geophysical constants are a property of the PLANET, so they live at batch
#     level and are written exactly once. Every case inherits them, so they
#     cannot drift between cases.
#   * The optics keys are a property of the ANALYSIS, and you vary the optics
#     table and effective radius within a batch, so they are per-case. A
#     batch-level value acts as the default for cases that don't override it.
#
# Usage:
#   python run_batch.py my_batch.yaml                      # every case
#   python run_time_series.py my_batch.yaml --case my_case_01   # just one
#   python run_time_series.py --list-experiments           # batches + cases


# =============================================================================
# INPUT DIRECTORY  (REQUIRED, batch level)
# =============================================================================

# Absolute path to the top-level archive directory.
root_dir: '/path/to/cesm/archive/'


# =============================================================================
# CASE -> PATH DERIVATION  (OPTIONAL, batch level — defaults shown)
# =============================================================================
# Each case's input folder and history files are derived from its name, so you
# never enumerate NetCDF filenames. '{case}' is substituted with the case name.
#
# The defaults match the standard CESM archive layout. Override them if your
# archive is laid out differently (e.g. data fetched down to a flat local dir,
# or history files whose prefix differs from the case name).

folder_template: '{case}/atm/hist'
file_template:   '{case}.cam.h1.*.nc'

# file_template is globbed, so it picks up every history file for the case.
# A case may override the result with an explicit 'folder' or 'file_pattern'
# if it needs to (e.g. to restrict the run to a subset of files).


# =============================================================================
# OUTPUT DIRECTORIES  (OPTIONAL, batch level — defaults shown)
# =============================================================================
# Output goes to <figures_dir>/<case_name>/ and <data_dir>/<case_name>/ —
# one directory per case, named for the case, not the batch.
#
# '~' and $VARS are expanded. A relative path is taken relative to the repo,
# NOT the working directory, so output lands in the same place no matter where
# the job was launched from.
#
# On an HPC system, do not leave these at the defaults: a batch of ~20 cases
# will blow through a typical $HOME quota. Set output_dir to a scratch or
# project filesystem — it is the parent of both, giving
# <output_dir>/figures/<case>/ and <output_dir>/data/<case>/:
#
#   output_dir: '/scratch/$USER/exovolc'
#
# Or set the two independently (either one overrides output_dir):

figures_dir: 'figures'
data_dir: 'data'

# A single run can override all of this without editing the YAML:
#   python run_batch.py my_batch.yaml --output-dir /scratch/$USER/exovolc


# =============================================================================
# PLANET-SPECIFIC PHYSICAL CONSTANTS  (REQUIRED, batch level)
# =============================================================================
# These must match the planet simulated. Do NOT use standard Earth values for
# exoplanet runs — grid geometry, layer mass, and AOD all depend on them.
#
# They are batch-level precisely so that a batch of ~20 cases on one planet
# states each constant once. If two runs need different constants, they are
# different planets and belong in different batches.

# Surface gravity [m/s²]
# Earth: 9.80665  |  example exo: 9.80665 * 0.93 = 9.121824
g_const: 9.80665

# Specific gas constant of the atmosphere [J/kg/K]
# Earth air (~N2/O2):  287.058
# Pure CO2 atmosphere: 188.965172522727
r_air: 287.058

# Mean planetary radius [m]
# Earth: 6.371e6  |  example exo: 6.371e6 * 0.91 = 5.797e6
r_earth: 6.371e6


# =============================================================================
# SCALAR TIME SERIES  (OPTIONAL, batch level — omit to skip all scalars)
# =============================================================================
# Each entry produces one CSV in data/<case>/scalar/<name>.csv and one
# quicklook PNG in figures/<case>/.
#
# method options:
#
#   mass_integral
#     Global total mass [kg] = Σ (q × air_mass_cell) over all lev, lat, lon.
#     Use for mixing-ratio fields (SO2, H2SO4, Q, …).
#
#   volume_integral
#     Global total mass [kg] = Σ (ρ × cell_volume) over all lev, lat, lon.
#     Use for density fields.  VOLCHZMD [g/cm³] is converted to kg/m³
#     internally before integrating.
#
#   area_mean
#     Gaussian-weight area-averaged global mean, returned in native variable
#     units.  Works for both 2D surface fields (TS, TMQ, TGCLDLWP) and 3D
#     fields (result is then a time series of the vertically-integrated mean).

scalar_vars:
  - name: SO2
    method: mass_integral
  - name: H2SO4
    method: mass_integral
  - name: VOLCHZMD
    method: volume_integral
  - name: Q
    method: mass_integral
  - name: TS
    method: area_mean
  - name: TGCLDLWP
    method: area_mean
  - name: TMQ
    method: area_mean


# =============================================================================
# VERTICAL PROFILE TIME SERIES  (OPTIONAL, batch level — omit to skip)
# =============================================================================
# Each entry produces one CSV in data/<case>/profiles/<name>.csv and one
# Hovmoller PNG (time × pressure level) in figures/<case>/.
# Profiles are always the area-weighted global mean at each model level.
# The 'method' key is accepted for forward-compatibility but is ignored.

profile_vars:
  - name: T
    method: area_mean
  - name: SO2
    method: area_mean
  - name: H2SO4
    method: area_mean
  - name: Q
    method: area_mean
  - name: VOLCHZMD
    method: area_mean


# =============================================================================
# ZONAL MEAN SNAPSHOTS  (OPTIONAL, batch level — omit either section to skip)
# =============================================================================
# Produces one PNG and one CSV per (variable, day) combination.
# Output goes to figures/<case>/zonal/ and data/<case>/zonal/.
#
# Variables in LOG_SCALE_DECADES (SO2, H2SO4, Q, VOLCHZMD) use LogNorm
# colormaps; all others use linear scale with 2nd-98th percentile clipping.
#
# CSV format: rows = pressure levels [mb], columns = latitudes [degrees].

zonal_mean_vars:
  - name: T
  - name: SO2
  - name: H2SO4
  - name: VOLCHZMD

zonal_mean_periods:
  increment: [0, 1, 4, 10, 50, 100]   # days since start


# =============================================================================
# AEROSOL OPTICS  (per-case keys; a batch-level value is the default)
# =============================================================================
# AOD requires the VOLCHZMD variable to be present in the CAM output.
# Omit optics_file (or set it to null) to skip AOD entirely.
#
# optics_file and volc_reff are PER-CASE: set them here to establish the
# batch default, then override them on individual cases below. rho_aerosol
# is batch-level (it is a property of the aerosol, not of the analysis).

# Path to the pre-computed Mie optics NetCDF (volc_pw1975_n68_r1.0um_mie.nc).
optics_file: '/path/to/volc_pw1975_n68_r1.0um_mie.nc'

# Effective particle radius [µm] used for Kext interpolation / Mie calculation.
volc_reff: 1.0

# Bulk aerosol density [g/cm³] (batch level). Used only by the Mie path.
# Sulfuric acid / water solution: ~1.84 g/cm³
rho_aerosol: 1.84

# ---------------------------------------------------------------------------
# Optional: single-wavelength Mie AOD at a custom wavelength (per-case).
# Uncomment all three to enable. Requires miepython.
# Produces an additional timeseries and zonal Hovmoller plot pair.
# ---------------------------------------------------------------------------
# mie_wavelength_um: 0.55          # wavelength [µm]
# mie_refractive_index_real: 1.43  # real part of complex refractive index
# mie_refractive_index_imag: 0.0   # imaginary part (positive convention)


# =============================================================================
# CASES  (REQUIRED)
# =============================================================================
# The eruption cases in this batch — typically ~20. Each case is one line
# unless it overrides something. The case name is also its output directory.
#
# A case may set only these keys:
#     name          (required — and must be unique within the batch)
#     optics_file, volc_reff
#     mie_wavelength_um, mie_refractive_index_real, mie_refractive_index_imag
#     folder, file_pattern   (escape hatch; normally derived from the name)
#
# Anything else belongs at batch level. Setting a batch-level key on a case is
# an error, so a constant like r_air cannot drift between cases.

cases:
  # Plain name: inherits every batch default above.
  - name: my_case_h10s9
  - name: my_case_h11s10

  # Override the effective radius for this case only.
  - name: my_case_h12s11
    volc_reff: 0.5

  # Different optics table AND radius.
  - name: my_case_h13s12
    optics_file: '/path/to/volc_pw1975_n68_r2.0um_mie.nc'
    volc_reff: 2.0
