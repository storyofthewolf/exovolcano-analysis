# Batch: Hunga Tonga eruption sensitivity suite — modern Earth.
#
# 20 cases sweeping eruption and microphysics parameters:
#   fid          reference / fiducial run
#   h2o_*        stratospheric water injected [Tg]  (h2o_none = dry control)
#   k*d          SO2 -> H2SO4 lifetime [days]
#   p*           injection pressure [mb]
#   r*           CARMA effective particle radius [µm]  <- overrides the optics
#   scrit*       critical supersaturation
#   sig*         plume width in ln(P)
#   sellitto_*   Sellitto et al. (2024) alternative SO2 / lifetime
#   so2_*        SO2 mass injected [Tg]
#
# Case list mirrors ../description_paper/experiment_yamls/hungatonga.yaml,
# which is the authoritative record of what was actually run.

root_dir: '/gpfsm/dnb33/etwolf/cesm_scratch/archive/'

# Standard CESM archive layout, so folder_template / file_template are left at
# their defaults ('{case}/atm/hist' and '{case}.cam.h1.*.nc'). History files are
# globbed — no need to enumerate them.

# --- Planet: modern Earth (written once; every case inherits) ---
g_const: 9.80665    # standard Earth (m/s^2)
r_air:   287.058    # Earth air, ~N2/O2 (J/kg/K)
r_earth: 6.371e6    # (m)

figures_dir: 'figures'
data_dir:    'data'

scalar_vars:
  - name: SO2
    method: mass_integral
  - name: H2SO4
    method: mass_integral
  - name: VOLCHZMD
    method: volume_integral
  - name: Q
    method: mass_integral
  - name: TS
    method: area_mean
  - name: TGCLDLWP
    method: area_mean
  - name: TMQ
    method: area_mean

profile_vars:
  - name: T
    method: area_mean
  - name: SO2
    method: area_mean
  - name: H2SO4
    method: area_mean
  - name: Q
    method: area_mean
  - name: VOLCHZMD
    method: area_mean

zonal_mean_vars:
  - name: T
  - name: SO2
  - name: H2SO4
  - name: VOLCHZMD

zonal_mean_periods:
  increment: [0, 1, 4, 10, 50, 100]   # days since start

# --- Aerosol optics ---
# Batch default: every case ran with carma_volc_reff = 0.5 µm, so the r0.5um
# Mie table is the default. The four '_r*' cases are the radius sweep and
# override both keys below — keep optics_file and volc_reff consistent, the
# file IS the Mie table for that radius.
optics_file: 'data/optprops/volc_pw1975_n68_r0.5um_mie.nc'
volc_reff:   0.5
rho_aerosol: 1.84

cases:
  # --- Fiducial ---
  - name: exovolc_hunga_fid

  # --- Stratospheric water sweep [Tg] ---
  # Hunga Tonga's defining feature; h2o_none is the dry-injection control.
  - name: exovolc_hunga_h2o_none
  - name: exovolc_hunga_h2o_50tg
  - name: exovolc_hunga_h2o_100tg
  - name: exovolc_hunga_h2o_146tg

  # --- SO2 lifetime (K) sweep [days] ---
  - name: exovolc_hunga_k17d
  - name: exovolc_hunga_k28d
  - name: exovolc_hunga_k35d

  # --- Plume parameter sweep ---
  - name: exovolc_hunga_p5
  - name: exovolc_hunga_p30

  # --- Effective radius sweep: these override the batch optics ---
  # r2.0 was not run for Hunga Tonga: the observed aerosol stayed sub-micron
  # (~0.35-0.45 um), so the sweep is 0.25/0.5/1.0 um.
  #
  # NOTE: volc_pw1975_n68_r0.25um_mie.nc is NOT in data/optprops/ on the local
  # machine (only r0.5, r1.0, r2.0 are). This path is correct for the cluster;
  # locally, AOD for this case will fail until the table is copied in. Run with
  # --no-aod, or set optics_file: null here, if you hit that before it exists.
  - name: exovolc_hunga_r0.25
    optics_file: 'data/optprops/volc_pw1975_n68_r0.25um_mie.nc'
    volc_reff:   0.25

  # Same radius as the batch default; stated explicitly so the sweep reads as a
  # set rather than one case silently relying on the default.
  - name: exovolc_hunga_r0.5
    optics_file: 'data/optprops/volc_pw1975_n68_r0.5um_mie.nc'
    volc_reff:   0.5

  - name: exovolc_hunga_r1
    optics_file: 'data/optprops/volc_pw1975_n68_r1.0um_mie.nc'
    volc_reff:   1.0

  # --- Critical supersaturation sweep ---
  - name: exovolc_hunga_scrit1.1
  - name: exovolc_hunga_scrit2
  - name: exovolc_hunga_scrit5

  # --- Plume width (sigma) sweep ---
  # fid IS the sigma=0.3 member, so it is not repeated here.
  - name: exovolc_hunga_sig0.1
  - name: exovolc_hunga_sig0.5

  # --- Sellitto et al. (2024) alternative SO2 / lifetime ---
  # sellitto_fid = both changes (1.0 Tg SO2, K=17 d); so2_1.0tg_k28 isolates
  # the SO2 axis. Together with fid and k17d these form a 2x2 in (SO2, K).
  - name: exovolc_hunga_sellitto_fid
  - name: exovolc_hunga_so2_1.0tg_k28
